storageBackend: dynamodb  # or 'postgres'
databaseUrl: ""           # only needed for postgres
domainName: "getharold.xyz"            # e.g. harold.dev
certificateArn: ""        # optional — or set CERTIFICATE_ARN env var to avoid committing AWS account ID
siteUrl: "https://getharold.xyz"  # e.g. https://example.com — required when emailVerification enabled
brandName: ""             # used in verification emails

emailVerification:
  enabled: false
  senderEmail: ""         # required when enabled (must be SES-verified)
  tokenExpiryHours: 24
