brandName: "Harold"
tagline: "Open source launch pages for AWS."
headline: "Ship your waitlist in minutes."
description: "Harold is a free, open-source scaffold for deploying beautiful coming soon pages on AWS. Edit two YAML files, run one command, and start collecting emails. No servers to manage. No surprise bills."
ctaText: "Join the Waitlist"
successMessage: "You're on the list. We'll let you know when Harold 1.0 ships."
verificationPendingMessage: "Check your email to confirm your spot."
verificationSuccessMessage: "You're confirmed! We'll keep you posted."
githubUrl: "https://github.com/willgraf/harold"
features:
  - title: "Two files to configure"
    description: "Edit site/config.yaml for branding and infra/config.yaml for infrastructure. Colors, fonts, copy — all in one place."
    icon: "◆"
  - title: "One command to deploy"
    description: "cdk deploy --all provisions CloudFront, Lambda, API Gateway, and DynamoDB. Everything you need, nothing you don't."
    icon: "▲"
  - title: "Built to grow with you"
    description: "Email verification, SNS notification hooks, and Postgres support are all included. Fork it, own it, ship it."
    icon: "●"
socialProof:
  line1: "Free and open source on GitHub"
  line2: "Join the waitlist for v1.0"
